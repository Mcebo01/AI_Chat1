name: .NET CI Build

on:
  push:
    branches: [ "master" ]   # keep master since your repo uses it
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Restore
      run: dotnet restore ./ai_chat1.csproj

    - name: Build
      run: dotnet build ./ai_chat1.csproj --configuration Release --no-restore
