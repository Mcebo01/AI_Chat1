name: .NET POE CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Install .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'   # Change if your project uses another version

    # 3. Restore dependencies
    - name: Restore
      run: dotnet restore

    # 4. Build project
    - name: Build
      run: dotnet build --configuration Release --no-restore

    # 5. Run the app (optional)
 
